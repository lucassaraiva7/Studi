<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Revisão Concluída! - Studi SaaS</title>
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --saas-primary: #4f46e5;
            --saas-primary-hover: #4338ca;
            --saas-bg: #f8fafc;
            --saas-card-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
            --saas-text-main: #1e293b;
            --saas-text-muted: #64748b;
            --saas-success: #10b981;
            --saas-danger: #ef4444;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--saas-bg);
            color: var(--saas-text-main);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
            margin: 0;
        }

        .congrats-container {
            width: 100%;
            max-width: 550px;
            animation: scaleUp 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .saas-card {
            background: #ffffff;
            border: 1px solid rgba(0,0,0,0.05) !important;
            border-radius: 32px !important;
            box-shadow: var(--saas-card-shadow) !important;
            overflow: hidden;
            text-align: center;
            padding: 3.5rem 2rem;
        }

        .medal-wrapper {
            width: 100px;
            height: 100px;
            background: #fffbeb;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 2rem;
            font-size: 3rem;
            color: #f59e0b;
            border: 4px solid #fef3c7;
            box-shadow: 0 10px 15px -3px rgba(245, 158, 11, 0.2);
            animation: bounce 2s infinite;
        }

        h1 {
            font-weight: 800;
            font-size: 2.25rem;
            color: var(--saas-text-main);
            margin-bottom: 1rem;
            letter-spacing: -0.025em;
        }

        .lead-text {
            font-size: 1.1rem;
            color: var(--saas-text-muted);
            margin-bottom: 2.5rem;
            line-height: 1.6;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
            margin-bottom: 3rem;
        }

        .stat-pill {
            padding: 1.5rem;
            border-radius: 24px;
            border: 1px solid rgba(0,0,0,0.03);
            transition: transform 0.2s ease;
        }

        .stat-pill:hover {
            transform: translateY(-5px);
        }

        .stat-pill-success {
            background-color: #ecfdf5;
            color: var(--saas-success);
        }

        .stat-pill-danger {
            background-color: #fef2f2;
            color: var(--saas-danger);
        }

        .stat-value {
            font-size: 2.5rem;
            font-weight: 800;
            display: block;
            line-height: 1;
            margin-bottom: 0.25rem;
        }

        .stat-label {
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            opacity: 0.8;
        }

        .btn-saas-primary {
            background-color: var(--saas-primary);
            color: white !important;
            border: none;
            padding: 1.25rem 2.5rem;
            border-radius: 18px;
            font-weight: 700;
            font-size: 1.1rem;
            width: 100%;
            transition: all 0.2s ease;
            box-shadow: 0 10px 15px -3px rgba(79, 70, 229, 0.3);
            text-decoration: none;
            display: inline-block;
        }

        .btn-saas-primary:hover {
            background-color: var(--saas-primary-hover);
            transform: translateY(-3px);
            box-shadow: 0 20px 25px -5px rgba(79, 70, 229, 0.4);
        }

        .confetti {
            position: absolute;
            width: 10px;
            height: 10px;
            background-color: #f00;
            opacity: 0;
        }

        @keyframes scaleUp {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .footer-tag {
            margin-top: 2rem;
            font-size: 0.7rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            color: var(--saas-text-muted);
            opacity: 0.4;
        }
    </style>
</head>
<body>

<div class="congrats-container">
    <div class="saas-card">
        <div class="medal-wrapper">
            <i class="fas fa-medal"></i>
        </div>
        
        <h1>Revisão Concluída!</h1>
        <p class="lead-text">Parabéns! Você revisou todos os cards que estavam pendentes hoje. Sua memória agradece.</p>

        <div class="stats-grid">
            <div class="stat-pill stat-pill-success">
                <span class="stat-value">{{ acertos }}</span>
                <span class="stat-label">Acertos</span>
            </div>
            <div class="stat-pill stat-pill-danger">
                <span class="stat-value">{{ erros }}</span>
                <span class="stat-label">Erros</span>
            </div>
        </div>

        <a href="{% url 'lista_materias' %}" class="btn-saas-primary">
            <i class="fas fa-home me-2"></i> Voltar para o Dashboard
        </a>

        <div class="footer-tag">
            Sessão Finalizada &bull; Studi SaaS
        </div>
    </div>
</div>

<!-- Bootstrap 5 JS Bundle -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
