{% extends 'base.html' %}

{% block title %}Confirmar Exclusão{% endblock %}

{% block content %}
<div class="container" style="max-width: 600px;">
    <div class="card text-center shadow-lg border-danger">
        <div class="card-header bg-danger text-white">
            <h2 class="mb-0">Atenção!</h2>
        </div>
        <div class="card-body">
            <p class="fs-5">Você tem certeza que deseja excluir permanentemente o flashcard?</p>
            
            <div class="alert alert-secondary">
                <strong>Pergunta:</strong> {{ card.question }}
            </div>

            <form method="post">
                {% csrf_token %}
                <!-- Campo oculto para manter a origem do redirecionamento -->
                <input type="hidden" name="origem" value="{{ origem }}">
                
                <button type="submit" class="btn btn-danger">Sim, tenho certeza</button>
                <a href="{{ request.META.HTTP_REFERER|default_if_none:request.get_full_path }}" class="btn btn-secondary">Cancelar</a>
            </form>
        </div>
    </div>
</div>
{% endblock %}
