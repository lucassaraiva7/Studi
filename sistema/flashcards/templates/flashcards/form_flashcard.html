{% extends "base.html" %} {% block content %}
    <h2>{{ titulo }}</h2>
    <p>Matéria: {{ materia.name }}</p>

    <form method="POST">
    {% csrf_token %}
    
    <input type="hidden" name="origem" value="{{ origem }}">

    {{ form.as_p }}
    
    <button type="submit" class="btn btn-success">Salvar Alterações</button>
    
    {% if origem == 'geral' %}
        <a href="{% url 'lista_flashcards' %}" class="btn btn-secondary">Cancelar</a>
    {% else %}
        <a href="{% url 'materia_detalhes' materia.id %}" class="btn btn-secondary">Cancelar</a>
    {% endif %}
</form>

{% endblock %}
