<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - Studi</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-dark: #0f172a;       
            --saas-blue: #2563eb;     
            --text-main: #1e293b;
            --text-muted: #64748b;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc;
            height: 100vh;
            overflow: hidden;
        }

        .split-container {
            display: flex;
            width: 100vw;
            height: 100vh;
        }

        /* Metade Esquerda: Área da Logo */
        .logo-side {
            flex: 1; 
            background-color: var(--bg-dark);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 4rem;
        }

        .studi-logo-wrapper {
            width: 100%;
            max-width: 480px; 
            height: auto;
            animation: float 4s ease-in-out infinite;
        }

        .studi-logo-wrapper svg {
            width: 100%;
            height: auto;
            display: block;
        }

        /* Metade Direita: Formulário */
        .form-side {
            flex: 1; 
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            background-color: #f8fafc;
            overflow-y: auto; 
        }

        .cadastro-box {
            width: 100%;
            max-width: 460px;
            background: white;
            padding: 35px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(15, 23, 42, 0.04);
        }

        .cadastro-box h2 {
            font-size: 1.75rem;
            font-weight: 700;
            color: var(--text-main);
            margin-bottom: 8px;
        }

        .cadastro-box .subtitle {
            color: var(--text-muted);
            font-size: 0.95rem;
            margin-bottom: 24px;
        }

        form p {
            margin-bottom: 14px;
            display: flex;
            flex-direction: column;
            color: var(--text-main);
            font-weight: 600;
            font-size: 0.85rem;
        }

        form .helptext {
            font-size: 0.75rem;
            color: var(--text-muted);
            font-weight: 400;
            margin-top: 4px;
            line-height: 1.3;
        }

        form input {
            width: 100%;
            padding: 10px 14px;
            margin-top: 4px;
            border: 1px solid #e2e8f0;
            border-radius: 10px;
            font-family: inherit;
            font-size: 0.9rem;
            color: var(--text-main);
            background-color: #f8fafc;
            transition: all 0.2s ease;
        }

        form input:focus {
            outline: none;
            border-color: var(--saas-blue);
            background-color: white;
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1);
        }

        .btn-submit {
            width: 100%;
            padding: 12px;
            background-color: var(--saas-blue);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 15px;
            transition: background-color 0.2s ease, transform 0.1s ease;
        }

        .btn-submit:hover {
            background-color: #1d4ed8;
        }

        .btn-submit:active {
            transform: scale(0.98);
        }

        .login-link {
            text-align: center;
            margin-top: 20px;
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        .login-link a {
            color: var(--saas-blue);
            text-decoration: none;
            font-weight: 600;
        }

        .login-link a:hover {
            text-decoration: underline;
        }

        @media (max-width: 992px) {
            .logo-side { padding: 3rem; }
        }

        @media (max-width: 768px) {
            .logo-side { display: none; }
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-12px); }
            100% { transform: translateY(0px); }
        }
    </style>
</head>
<body>

    <div class="split-container">
        
        <div class="logo-side">
            <div class="studi-logo-wrapper">
                <svg viewBox="0 0 450 120" xmlns="http://www.w3.org/2000/svg">
                    <rect x="25" y="35" width="44" height="62" rx="6" fill="#3b82f6" transform="rotate(-15 47 66)"/>
                    
                    <rect x="75" y="35" width="44" height="62" rx="6" fill="#1d4ed8" transform="rotate(15 97 66)"/>
                    
                    <rect x="49" y="24" width="46" height="66" rx="6" fill="#ffffff" stroke="#2563eb" stroke-width="4"/>
                    <line x1="59" y1="44" x2="85" y2="44" stroke="#93c5fd" stroke-width="4" stroke-linecap="round"/>
                    <line x1="59" y1="58" x2="75" y2="58" stroke="#93c5fd" stroke-width="4" stroke-linecap="round"/>
                    
                    <text x="145" y="85" font-family="'Inter', sans-serif" font-weight="800" font-size="72" fill="#ffffff">Studi</text>
                </svg>
            </div>
        </div>

        <div class="form-side">
            <div class="cadastro-box">
                <h2>Criar sua conta</h2>
                <p class="subtitle">Insira seus dados para começar a estudar.</p>
                
                <form method="POST">
                    {% csrf_token %}
                    {{ form.as_p }}
                    <button type="submit" class="btn-submit">Finalizar Cadastro</button>
                </form>

                <div class="login-link">
                    <p>Já possui uma conta? <a href="{% url 'login' %}">Faça login aqui</a></p>
                </div>
            </div>
        </div>

    </div>

</body>
</html>
