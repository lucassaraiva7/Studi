{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Studi{% endblock %}</title>
    
    <link rel="icon" type="image/png" href="{% static 'favicon.png' %}">
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --sidebar-bg: #0f172a; 
            --saas-blue: #2563eb;   
            --saas-blue-light: #eff6ff;
            --text-muted: #94a3b8;
            --sidebar-width: 70px; 
        }

        body.sidebar-expanded {
            --sidebar-width: 260px;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc;
            color: #1e293b;
            min-height: 100vh;
            overflow-x: hidden;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* --- BARRA LATERAL (SIDEBAR) --- */
        .saas-sidebar {
            position: fixed;
            top: 0;
            left: 0;
            bottom: 0;
            width: var(--sidebar-width);
            background-color: var(--sidebar-bg);
            height: 100vh;
            z-index: 1050;
            transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
            box-shadow: 4px 0 25px rgba(0, 0, 0, 0.05);
            overflow: hidden;
        }

        .sidebar-header {
            height: 70px;
            display: flex;
            align-items: center;
            padding: 0 1.25rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .toggle-menu-btn {
            background: none;
            border: none;
            color: white;
            font-size: 1.25rem;
            cursor: pointer;
            padding: 0.5rem;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
        }
        .toggle-menu-btn:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .sidebar-logo-text {
            color: white;
            font-weight: 800;
            font-size: 1.25rem;
            margin-left: 1rem;
            white-space: nowrap;
            opacity: 0;
            transform: translateX(-10px);
            transition: all 0.2s ease;
        }
        body.sidebar-expanded .sidebar-logo-text {
            opacity: 1;
            transform: translateX(0);
        }

        .sidebar-nav {
            list-style: none;
            padding: 1rem 0.75rem;
            margin: 0;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .nav-item-link {
            display: flex;
            align-items: center;
            padding: 0.85rem 1rem;
            color: var(--text-muted);
            text-decoration: none;
            border-radius: 12px;
            transition: all 0.2s ease;
            white-space: nowrap;
        }

        .nav-item-link i {
            font-size: 1.2rem;
            min-width: 24px;
            text-align: center;
        }

        .nav-item-text {
            margin-left: 1rem;
            font-weight: 600;
            font-size: 0.95rem;
            opacity: 0;
            transition: opacity 0.2s ease;
        }

        body.sidebar-expanded .nav-item-text {
            opacity: 1;
        }

        .nav-item-link:hover {
            color: white;
            background: rgba(255, 255, 255, 0.05);
        }

        .nav-item-link.active {
            background: var(--saas-blue);
            color: white;
        }

        /* Ajuste do botão de logout para se comportar como o link */
        .nav-item-btn-logout {
            border: none;
            background: transparent;
            width: 100%;
            text-align: left;
        }
        .nav-item-btn-logout:hover i, 
        .nav-item-btn-logout:hover span {
            color: #ef4444 !important; 
        }

        /* --- CONTEÚDO PRINCIPAL --- */
        .main-wrapper {
            margin-left: var(--sidebar-width);
            min-height: 100vh;
            transition: margin-left 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
        }

        .saas-topbar {
            height: 70px;
            background: white;
            border-bottom: 1px solid #e2e8f0;
            display: flex;
            align-items: center;
            padding: 0 2rem;
        }

        .page-content-body {
            flex-grow: 1;
            padding: 2rem;
        }
    </style>
</head>
<body>

    <div class="saas-sidebar">
        <div class="sidebar-header">
            <button class="toggle-menu-btn" id="menuToggle" title="Expandir menu">
                <i class="fas fa-bars"></i>
            </button>
            <span class="sidebar-logo-text">Studi</span>
        </div>

        <ul class="sidebar-nav">
            <li>
                <a href="{% url 'dashboard:index' %}" class="nav-item-link {% if request.resolver_match.app_name == 'dashboard' %}active{% endif %}">
                    <i class="fas fa-chart-pie"></i>
                    <span class="nav-item-text">Dashboard</span>
                </a>
            </li>
            <li>
                <a href="{% url 'subjects:lista_materias' %}" class="nav-item-link {% if request.resolver_match.app_name == 'subjects' %}active{% endif %}">
                    <i class="fas fa-book-bookmark"></i>
                    <span class="nav-item-text">Matérias</span>
                </a>
            </li>
            <li>
                <a href="{% url 'flashcards:lista_flashcards' %}" class="nav-item-link {% if request.resolver_match.app_name == 'flashcards' %}active{% endif %}">
                    <i class="fas fa-layer-group"></i>
                    <span class="nav-item-text">Flashcards</span>
                </a>
            </li>
            <li>
                <a href="{% url 'generator:criar_com_ia' %}" class="nav-item-link {% if request.resolver_match.app_name == 'generator' %}active{% endif %}">
                    <i class="fas fa-wand-magic-sparkles"></i>
                    <span class="nav-item-text">Gerador IA</span>
                </a>
            </li>
        </ul>

        {% if user.is_authenticated %}
        <ul class="sidebar-nav mt-auto border-top border-secondary border-opacity-10">
            <li>
                <a href="{% url 'perfil' %}" class="nav-item-link {% if request.resolver_match.url_name == 'perfil' %}active{% endif %}">
                    <i class="fas fa-user-gear"></i>
                    <span class="nav-item-text">Minha Conta ({{ user.username }})</span>
                </a>
            </li>
            <li>
                <form action="{% url 'logout' %}" method="POST" class="m-0 p-0">
                    {% csrf_token %}
                    <button type="submit" class="nav-item-link nav-item-btn-logout">
                        <i class="fas fa-right-from-bracket text-muted"></i>
                        <span class="nav-item-text text-muted">Sair</span>
                    </button>
                </form>
            </li>
        </ul>
        {% endif %}
    </div>

    <div class="main-wrapper">
        <div class="saas-topbar justify-content-end">
            <div class="text-secondary small fw-medium">
                {% now "l, d \d\e F" %}
            </div>
        </div>

        <div class="page-content-body">
            {% block content %}
            {% endblock %}
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        const menuToggle = document.getElementById('menuToggle');
        const body = document.body;

        if (localStorage.getItem('sidebar-expanded') === 'true') {
            body.classList.add('sidebar-expanded');
        }

        menuToggle.addEventListener('click', () => {
            body.classList.toggle('sidebar-expanded');
            localStorage.setItem('sidebar-expanded', body.classList.contains('sidebar-expanded'));
        });
    </script>
</body>
</html>
